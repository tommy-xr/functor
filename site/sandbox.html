    <title>functor sandbox — live Functor Lang playground</title>
    <meta
      name="description"
      content="Write Functor Lang in the browser and watch the scene hot-reload live, model preserved."

    <header class="site-header">

        <label class="picker-label" for="example-picker">scene</label>
        <select id="example-picker"></select>
        <button id="reset" type="button" title="Reload the example (resets the model)">
          ↺ reset

        <span id="status" class="status-pill" data-state="busy">◌ loading…</span>

    </header>

    <main class="sandbox-split">
      <section class="editor-pane">
        <div id="editor"></div>
      </section>
      <section class="preview-pane">
        <iframe id="player" title="live game preview" allow="pointer-lock"></iframe>
      </section>
    </main>

    <div id="statusbar"></div>

    <script type="module" src="assets/sandbox.js"></script>
