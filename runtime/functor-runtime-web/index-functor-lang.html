<html>
  <!-- The Functor Lang index page (docs/functor-lang.md Track C5), served at `/` by the CLI's
       dev server for `"language": "functor-lang"` projects. Unlike index.html there is
       no game wasm module to import: the runtime itself fetches the `.fun`
       entry (declared via window.__functorLangGamePath below) and interprets it, so
       this page only wires input into the runtime's `functor_lang_*` exports. -->
  <head>
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type" />
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; }
      /* Fill the window; the runtime sizes the drawable buffer (and GL
         viewport) to match this displayed size each frame, scaled for HiDPI. */
      #canvas { display: block; width: 100%; height: 100%; }
      /* Explicit mouse-look toggle. The cursor stays FREE by default so the
         time-travel scrubber is usable without the pointer being grabbed on
         every click; press this (or Esc to release) to control the camera. */
      #mouselook {
        position: fixed; top: 10px; left: 10px; z-index: 10;
        font: 12px/1 monospace; padding: 6px 10px; cursor: pointer;
        color: #ddd; background: rgba(20,20,24,0.72);
        border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
      }
      #mouselook:hover { background: rgba(40,40,48,0.85); }
      /* The time-travel scrubber — native DOM OUTSIDE the canvas, so its
         controls never fight the game's pointer handling (docs/time-travel.md
         T3). Hidden until the runtime has recorded some history. */
      #scrubber {
        position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%);
        z-index: 10; display: none; align-items: center; gap: 10px;
        font: 12px/1 monospace; color: #eee; padding: 8px 12px 20px;
        background: rgba(20,20,24,0.82); border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.14);
      }
      #scrubber button {
        font: 12px/1 monospace; color: #eee; cursor: pointer;
        background: rgba(80,80,90,0.6); border: 1px solid rgba(255,255,255,0.15);
        border-radius: 5px; padding: 5px 9px;
      }
      #scrubber button:hover { background: rgba(110,110,125,0.7); }
      /* Frame counter: a small faded row BELOW the controls, inside the panel
         (the bar's extra bottom padding is its home), centered — positioned,
         so digit growth never reflows the controls. */
      #scrub-label {
        position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
        opacity: 0.5; font-size: 9.5px; white-space: nowrap; pointer-events: none;
      }
      /* The timeline rail: the range input spans the RECORDED part; the
         translucent strip marks [handle, handle + preview window] — the rail's
         domain extends past the recorded end while a preview is on. */
      #scrub-rail { position: relative; display: flex; align-items: center; width: 340px; }
      #scrub-slider { width: 100%; accent-color: #e0803a; }
      #scrub-future {
        position: absolute; height: 3px; bottom: 5px; border-radius: 2px;
        background: rgba(224,128,58,0.45); pointer-events: none; display: none;
      }
      #scrubber label { display: flex; align-items: center; gap: 4px; }
      #scrubber input[type="number"] {
        width: 42px; font: 12px/1 monospace; color: #eee;
        background: rgba(80,80,90,0.6); border: 1px solid rgba(255,255,255,0.15);
        border-radius: 5px; padding: 4px 5px;
      }
      /* Future preview (docs/time-travel.md T6/T6d): mode selector; the shared
         window/samples knobs live in the ⚙ popover. */
      #scrub-preview {
        font: 12px/1 monospace; color: #eee;
        background: rgba(80,80,90,0.6); border: 1px solid rgba(255,255,255,0.15);
        border-radius: 5px; padding: 4px 5px;
      }
      #scrub-adv { position: relative; }
      #scrub-adv > summary {
        list-style: none; cursor: pointer; font-size: 14px; padding: 4px 6px;
        background: rgba(80,80,90,0.6); border: 1px solid rgba(255,255,255,0.15);
        border-radius: 5px; user-select: none;
      }
      #scrub-adv > summary::-webkit-details-marker { display: none; }
      #scrub-adv[open] > summary { background: rgba(110,110,125,0.7); }
      #scrub-adv-pop {
        position: absolute; bottom: 130%; right: 0; z-index: 11;
        display: flex; flex-direction: column; gap: 8px; padding: 10px 12px;
        background: rgba(20,20,24,0.92); border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.14); white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <button id="mouselook" title="Control the camera with the mouse; Esc to release">🖱 mouse look</button>
    <div id="scrubber">
      <span id="scrub-label">time-travel</span>
      <button id="scrub-pause">Pause</button>
      <span id="scrub-rail">
        <input id="scrub-slider" type="range" min="0" max="0" value="0" step="1" />
        <span id="scrub-future"></span>
      </span>
      <button id="scrub-step">Step ▸</button>
      <label title="Future preview while paused: trail dots, scene-space strobe copies, or the screen-space ghost compositor (docs/time-travel.md T6)">
        <select id="scrub-preview">
          <option value="0" selected>preview: off</option>
          <option value="1">preview: trail</option>
          <option value="2">preview: strobe</option>
          <option value="3">preview: both</option>
          <option value="4">preview: ghost</option>
        </select>
      </label>
      <details id="scrub-adv">
        <summary title="Preview settings">⚙</summary>
        <div id="scrub-adv-pop">
          <label title="How far ahead the preview projects">window
            <input id="scrub-win" type="number" step="0.5" min="0.5" max="5" value="2" />s
          </label>
          <label title="Forward samples across the window (ghost composites at most 8)">samples
            <input id="scrub-samples" type="number" min="1" max="64" value="32" />
          </label>
        </div>
      </details>
    </div>
    <script type="module">

      import init, {
        functor_lang_key_event,
        functor_lang_mouse_move,
        functor_lang_mouse_wheel,
        functor_lang_ui_pointer,
        functor_lang_ui_pointer_leave,
        functor_lang_ui_key,
        functor_lang_ui_wants_keyboard,
        functor_lang_is_running,
        functor_lang_set_source,
        functor_lang_scene_frame,
        functor_lang_scene_range,
        functor_lang_seek_scene,
        functor_lang_scrub_toggle_pause,
        functor_lang_scrub_step,
        functor_lang_scrub_paused,
        functor_lang_scrub_set_preview,
        functor_lang_scrub_set_preview_config,
      } from "./pkg/functor_runtime_web.js";

      // The Functor Lang entry file, substituted in by the CLI's dev server (see
      // cli/src/util/wasm_dev_server.rs). Must be set before init(): the
      // runtime reads it at start to choose the interpreter producer over the
      // F# game-module bridge. The runtime fetches this as a URL, so encode
      // each path segment (spaces, '#', '?') while keeping subdirectories.
      window.__functorLangGamePath = "__FUNCTOR_LANG_ENTRY__"
        .split("/").map(encodeURIComponent).join("/");

      // The project's full file list (entry first, then siblings) — file =
      // module, so a game split across game.fun + pieces.fun loads all its
      // modules. The CLI substitutes this JSON array (see wasm_dev_server.rs);
      // each path is URL-encoded per segment like the entry above.
      window.__functorLangProjectFiles = ("__FUNCTOR_LANG_PROJECT_FILES__")
        .map((p) => p.split("/").map(encodeURIComponent).join("/"));

      // Map a browser KeyboardEvent.code to the canonical key code expected by
      // the game (functor_runtime_common::Key as i32 — the same mapping as
      // index.html). Keep in sync with that enum: A=1..Z=26, then the entries
      // below. 0 = Unknown.
      const keyCode = (code) => {
        // "KeyA".."KeyZ" -> 1..26 ('A' is char code 65).
        if (code.length === 4 && code.startsWith("Key")) {
          return code.charCodeAt(3) - 64;
        }
        // "Digit0".."Digit9" / "Numpad0".."Numpad9" -> Num0=34..Num9=43.
        if (code.startsWith("Digit") && code.length === 6) {
          return code.charCodeAt(5) - 48 + 34;
        }
        if (code.startsWith("Numpad") && code.length === 7) {
          return code.charCodeAt(6) - 48 + 34;
        }
        switch (code) {
          case "ArrowUp": return 27;
          case "ArrowDown": return 28;
          case "ArrowLeft": return 29;
          case "ArrowRight": return 30;
          case "Space": return 31;
          case "Enter": return 32;
          case "Escape": return 33;
          default: return 0;
        }
      };

      const setupInput = () => {
        const canvas = document.getElementById("canvas");

        // Keyboard. Ignore auto-repeat (the game tracks held state itself), and
        // swallow keys we handle so Space/arrows don't scroll the page.
        // While a Ui.textInput is focused (the runtime reports it after each
        // frame), keydowns route to the OVERLAY instead — the game's input
        // hook is suppressed (docs/ui-interaction.md U4; repeats pass
        // through so held backspace repeats). Modifier combos (Cmd+R,
        // Ctrl+…) and unconsumed keys (F5) keep their browser behavior.
        // `gameHeld` tracks the presses the GAME actually received, so a
        // release whose press was swallowed by a focused field never leaks
        // a phantom release edge.
        const gameHeld = new Set();
        window.addEventListener("keydown", (e) => {
          if (functor_lang_ui_wants_keyboard()) {
            if (e.metaKey || e.ctrlKey || e.altKey) return;
            if (functor_lang_ui_key(e.key)) e.preventDefault();
            return;
          }
          const code = keyCode(e.code);
          if (code === 0) return;
          e.preventDefault();
          if (!e.repeat) {
            functor_lang_key_event(code, true);
            gameHeld.add(code);
          }
        });
        window.addEventListener("keyup", (e) => {
          const code = keyCode(e.code);
          if (code === 0) return;
          if (gameHeld.delete(code)) functor_lang_key_event(code, false);
        });

        // Mouse free-look. Pointer Lock is the browser equivalent of the
        // desktop runtime's GLFW cursor capture, giving movementX/Y relative
        // motion. Entered EXPLICITLY via the "mouse look" button (not on every
        // canvas click) so the cursor stays free for the time-travel scrubber;
        // Esc releases the lock (browser default). We accumulate movement into a
        // running position so the game's "delta = current - lastMouse" works the
        // same as on native.
        document
          .getElementById("mouselook")
          .addEventListener("click", () => canvas.requestPointerLock());
        let ax = 0;
        let ay = 0;
        document.addEventListener("mousemove", (e) => {
          // Only drive the camera while in look mode (pointer locked); otherwise
          // moving the cursor to the scrubber must not rotate the view.
          if (document.pointerLockElement !== canvas) return;
          ax += e.movementX;
          ay += e.movementY;
          functor_lang_mouse_move(ax, ay);
        });

        canvas.addEventListener("wheel", (e) => {
          e.preventDefault();
          functor_lang_mouse_wheel(Math.sign(e.deltaY));
        });

        // Interactive game UI (docs/ui-interaction.md U3): while the pointer
        // is FREE (not look mode), its canvas position + primary button drive
        // the game's `Ui.*` widgets. CSS px — the runtime scales by the
        // device pixel ratio. Pointer lock engaging counts as leaving.
        let uiButtonDown = false;
        const uiPointer = (e) => {
          if (document.pointerLockElement === canvas) return;
          functor_lang_ui_pointer(e.offsetX, e.offsetY, uiButtonDown);
        };
        canvas.addEventListener("mousemove", uiPointer);
        canvas.addEventListener("mousedown", (e) => {
          if (e.button !== 0) return;
          uiButtonDown = true;
          uiPointer(e);
        });
        canvas.addEventListener("mouseup", (e) => {
          if (e.button !== 0) return;
          uiButtonDown = false;
          uiPointer(e);
        });
        canvas.addEventListener("mouseleave", () => {
          uiButtonDown = false;
          functor_lang_ui_pointer_leave();
        });
        document.addEventListener("pointerlockchange", () => {
          if (document.pointerLockElement === canvas) functor_lang_ui_pointer_leave();
        });
      };

      // The time-travel scrubber (docs/time-travel.md T3). Native DOM controls
      // drive the runtime through the `functor_lang_scrub_*` exports and poll the
      // published view state each frame to track the handle. Coalesce drags to
      // one seek per frame, and don't fight the user's drag by writing the
      // slider value while they hold it.
      const setupScrubber = () => {
        const el = document.getElementById("scrubber");
        const label = document.getElementById("scrub-label");
        const pause = document.getElementById("scrub-pause");
        const slider = document.getElementById("scrub-slider");
        const step = document.getElementById("scrub-step");
        const future = document.getElementById("scrub-future");

        let scrubbing = false;
        let pendingSeek = null;
        slider.addEventListener("pointerdown", () => (scrubbing = true));
        window.addEventListener("pointerup", () => (scrubbing = false));
        slider.addEventListener("input", () => (pendingSeek = Number(slider.value)));
        pause.addEventListener("click", () => functor_lang_scrub_toggle_pause());
        step.addEventListener("click", () => functor_lang_scrub_step());

        // Future preview (docs/time-travel.md T6/T6d): JS owns the selector +
        // the ⚙ popover state and pushes on change; the frame loop overlays /
        // composites while paused. Pushed once at setup too: the browser may
        // restore form state across a reload while the fresh runtime starts at
        // Off / the defaults.
        const preview = document.getElementById("scrub-preview");
        const win = document.getElementById("scrub-win");
        const samples = document.getElementById("scrub-samples");
        const pushPreview = () => functor_lang_scrub_set_preview(+preview.value);
        const pushConfig = () =>
          functor_lang_scrub_set_preview_config(+win.value, +samples.value);
        preview.addEventListener("change", pushPreview);
        win.addEventListener("input", pushConfig);
        samples.addEventListener("input", pushConfig);
        pushPreview();
        pushConfig();

        const update = () => {
          if (pendingSeek !== null) {
            functor_lang_seek_scene(pendingSeek);
            pendingSeek = null;
          }
          const range = functor_lang_scene_range(); // [] or [lo, hi]
          if (range.length === 2) {
            el.style.display = "flex";
            const lo = range[0], hi = range[1];
            slider.min = lo;
            slider.max = hi;
            const frame = functor_lang_scene_frame();
            if (!scrubbing) slider.value = frame; // don't tug the handle mid-drag
            label.textContent = `${frame | 0} / ${hi | 0}`;
            pause.textContent = functor_lang_scrub_paused() ? "Resume" : "Pause";
            // Future pseudo-bar: while a preview mode is on, the rail's domain
            // extends past the recorded end by the preview window (60 fixed
            // frames/sec) — the slider spans the recorded part and the strip
            // marks [handle, handle + window], showing how far ahead the
            // preview looks.
            const span = hi - lo;
            const futureFrames = +preview.value !== 0 ? +win.value * 60 : 0;
            if (futureFrames > 0 && span > 0) {
              const total = span + futureFrames;
              slider.style.width = `${(span / total) * 100}%`;
              // The thumb's CENTER travels an inset range inside the input
              // (≈ half the thumb), so start the strip there — not at the
              // input's box edge — to meet the handle.
              const railW = slider.parentElement.offsetWidth;
              const inset = 7;
              const leftPx =
                inset + ((frame - lo) / span) * (slider.offsetWidth - 2 * inset);
              const widthPx = Math.min(
                (futureFrames / total) * railW,
                railW - leftPx
              );
              future.style.left = `${leftPx}px`;
              future.style.width = `${widthPx}px`;
              future.style.display = "block";
            } else {
              slider.style.width = "100%";
              future.style.display = "none";
            }
          } else {
            el.style.display = "none"; // nothing recorded yet
          }
          requestAnimationFrame(update);
        };
        requestAnimationFrame(update);
      };

      // Editor live-preview bridge (docs/functor-lang.md D4): a hosting page (the
      // VSCode webview's iframe bridge, or a test driving this page directly)
      // posts the full .fun source and the runtime hot-swaps it, model
      // preserved — the postMessage face of the desktop runner's
      // POST /reload-source. Pushes are accepted only from the HOSTING
      // frame (the game code running in this page could otherwise spoof
      // them); replies go only to the sender.
      const setupSetSource = () => {
        window.addEventListener("message", (event) => {
          if (event.source !== window.parent) return;
          const data = event.data;
          if (!data || data.type !== "functor-lang-set-source" || typeof data.source !== "string") return;
          // Queue the source; the wasm frame loop applies it at a safe point
          // (never mid-frame) and posts back an `functor-lang-set-source-result` message
          // with the outcome — so a broken push keeps the old program running.
          functor_lang_set_source(data.source);
        });
        // Tell the hosting frame the push seam is live — the editor panel
        // flushes the current buffer on this (edits made while the server
        // and wasm were still starting would otherwise be dropped), and its
        // absence tells the panel it's NOT looking at a Functor Lang preview page.
        // "Live" means the PRODUCER is installed, not just the wasm module:
        // run_async still has to fetch the source, so poll — a ready sent
        // before functor_lang_is_running() would invite a push that gets dropped.
        if (window.parent !== window) {
          const announce = () => {
            if (functor_lang_is_running()) {
              window.parent.postMessage({ type: "functor-lang-preview-ready" }, "*");
            } else {
              setTimeout(announce, 50);
            }
          };
          announce();
        }
      };

      init().then(() => {
        // In a deterministic capture (?fixed-time), don't wire up input — a
        // stray mouse move would turn the camera, like on native.
        const deterministic = new URLSearchParams(window.location.search).has("fixed-time");
        if (!deterministic) {
          setupInput();
          setupScrubber();
        }
        setupSetSource();
      });
    </script>
  </body>
</html>
