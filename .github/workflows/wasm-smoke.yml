name: WASM smoke

# Loads every self-contained Functor Lang sample in the real web runtime (headless
# Chromium) and asserts it LOADS → survives a pushed reload → ticks a few frames
# without a persistent error overlay. This is the guard for "works native,
# broken in wasm" divergence — a missing sibling module, a dropped record field,
# a contract regression — that the native tests and even the wasm GOLDEN tests
# miss (goldens run under `--fixed-time`, which masks first-frame races).
#
# Software WebGL2 (swiftshader, set in e2e/wasm-smoke.mjs) means no GPU is
# needed, so this runs on a plain ubuntu runner.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  wasm-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: npm install -g wasm-pack

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      # Post-E3 the single `functor` binary always includes the native
      # GLFW/OpenGL runtime, so building the CLI links X11/GL/ALSA — install the
      # same system libs as build-native.yml / golden.yml (even though this job
      # only serves wasm, the binary links them).
      - name: Install GL/X11 system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libglfw3 \
            libglfw3-dev \
            libasound2-dev \
            libfontconfig-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # The single `functor` binary embeds the web-runtime bundle via
      # `include_bytes!`, so the bundle must exist before the CLI is built.
      - name: Build web runtime bundle
        run: wasm-pack build --target=web
        working-directory: runtime/functor-runtime-web

      # The editor's language intelligence — without it, test:site silently
      # SKIPs every lang-intel check (lint/hover/completion) instead of
      # exercising them.
      - name: Build language analysis wasm
        run: npm run build:lang-wasm

      - name: Build functor CLI
        run: cargo build --bin functor

      - name: Run wasm smoke
        run: npm run test:wasm-smoke

      # Remote (URL) asset loading in the browser: builds a wasm bundle that
      # loads a good URL and a 404 URL from a localhost CORS server and asserts
      # the real fetches (200 / 404) + graceful fallback. Hermetic — no network.
      - name: Run wasm remote-asset e2e
        run: npm run test:wasm-remote-assets

      - name: Run scrubber model tests
        run: npm run test:scrubber

      - name: Run site sandbox browser tests
        run: npm run test:site

      - name: Run IDE page browser tests
        run: npm run test:ide-page
