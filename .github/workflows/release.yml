name: Release

# The release pipeline (manually dispatched, main only). Dispatched with a
# version X.Y.Z — or with none, in which case the version is computed from
# the conventional commits since the last release tag plus a language-surface
# check (scripts/next-version.mjs) — it:
#
#   1. resolves + validates the version and that the tag vX.Y.Z is free
#   2. generates release notes from the conventional commits since the last
#      release tag (git-cliff, config in cliff.toml)
#   3. builds + sanity-checks the `functor` binary (and the functor-lang-lsp
#      language server) for every supported platform (release-binaries.yml,
#      reused via workflow_call)
#   4. packages a platform VS Code extension VSIX per target with the
#      language server bundled and the release version injected
#   5. creates the vX.Y.Z tag and a PRE-RELEASE GitHub release (Functor is
#      alpha) with the notes, platform archives, and VSIXes attached
#   6. publishes the VSIXes to the VS Code Marketplace and Open VSX — each
#      gated on its PAT secret (VSCE_PAT / OVSX_PAT), skipped with a notice
#      when the secret isn't configured
#   7. dispatches Deploy Site, so the deployed site header picks up the new
#      tag (a GITHUB_TOKEN-created tag does not fire push-triggered workflows
#      on its own — explicit workflow_dispatch is the sanctioned exception)
#
# The tag is the single source of truth for the version: nothing in-repo is
# bumped. The binaries bake the version via FUNCTOR_RELEASE_VERSION (the CLI
# crate stays 0.0.0-dev), and the site stamps its header badge from the
# latest reachable tag at build time.
#
# `inputs.version` is user-controlled text: every job reads it through an
# env var (never `${{ }}`-interpolated into a `run:` script), so it cannot
# inject shell into a write-capable job.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the leading v (e.g. 0.1.0). Leave empty to compute it from the commits since the last release tag."
        required: false
        default: ""
        type: string

concurrency:
  group: release # never two releases at once; a second dispatch queues
  cancel-in-progress: false

# Only the jobs that need write access get it (see their `permissions`).
permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags: the version calc and git-cliff walk
          # last-tag..HEAD, and the tag-free check needs the existing tags.
          fetch-depth: 0

      - name: Resolve + validate version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          [[ "$GITHUB_REF" == "refs/heads/main" ]] \
            || { echo "::error::releases are cut from main, not $GITHUB_REF"; exit 1; }
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$(node scripts/next-version.mjs)"
          fi
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] \
            || { echo "::error::version '$VERSION' is not of the form X.Y.Z"; exit 1; }
          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "::error::tag v$VERSION already exists"
            exit 1
          fi
          echo "releasing v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2.13.1

      - name: Generate release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git-cliff --unreleased --tag "v$VERSION" -o release-notes.md
          cat release-notes.md

      - uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 14

  binaries:
    needs: prepare
    uses: ./.github/workflows/release-binaries.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  # One VSIX per platform, each bundling that platform's language server.
  # vsce's --target makes the Marketplace serve the right one automatically;
  # release-page installs pick the file matching their platform.
  vsix:
    needs: [prepare, binaries]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # Each lsp-<target> artifact lands in its own subdir of lsp/.
      - uses: actions/download-artifact@v4
        with:
          pattern: lsp-*
          path: lsp

      # The platform archives — each VSIX also bundles its platform's functor
      # CLI, so the extension is an all-in-one install (archive names are
      # unique, so a flat merge is safe).
      - uses: actions/download-artifact@v4
        with:
          pattern: functor-*
          path: cli
          merge-multiple: true

      # Root deps too: the extension's vscode:prepublish hook runs the repo's
      # icon generator (scripts/generate-icons.mjs).
      - name: Install npm dependencies
        run: |
          npm ci
          npm ci --prefix tools/functor-lang-vscode

      - name: Package platform VSIXes
        working-directory: tools/functor-lang-vscode
        run: |
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          mkdir -p out
          for pair in \
            x86_64-unknown-linux-gnu:linux-x64 \
            aarch64-apple-darwin:darwin-arm64 \
            x86_64-apple-darwin:darwin-x64 \
            x86_64-pc-windows-msvc:win32-x64; do
            target="${pair%%:*}"
            vt="${pair##*:}"
            rm -rf server bin && mkdir server bin
            if [[ "$vt" == win32-x64 ]]; then
              cp "$GITHUB_WORKSPACE/lsp/lsp-$target/functor-lang-lsp.exe" server/
              # The zip carries the binary at the archive root. unzip, NOT
              # tar: ubuntu's GNU tar cannot read zip (bsdtar is a mac thing).
              unzip -o -j "$GITHUB_WORKSPACE/cli/functor-$VERSION-$target.zip" functor.exe -d bin
            else
              # download-artifact does not preserve the exec bit; vsce records
              # file modes into the VSIX, so restore it before packaging.
              cp "$GITHUB_WORKSPACE/lsp/lsp-$target/functor-lang-lsp" server/
              chmod +x server/functor-lang-lsp
              # The tarball nests functor-<version>-<target>/functor.
              tar -xzf "$GITHUB_WORKSPACE/cli/functor-$VERSION-$target.tar.gz" -C bin \
                --strip-components=1 "functor-$VERSION-$target/functor"
              chmod +x bin/functor
            fi
            npx --yes @vscode/vsce@3.9.2 package --target "$vt" --pre-release \
              --out "out/functor-lang-$VERSION-$vt.vsix"
          done
          ls -l out

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-bundles
          path: tools/functor-lang-vscode/out/*.vsix
          retention-days: 14

  publish:
    needs: [prepare, binaries, vsix]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # create the tag + release
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      # Only what gets attached to the release lands in assets/: the platform
      # archives (functor-*), the notes, and the VSIXes — NOT the raw lsp-*
      # binaries (whose identical filenames would also collide when merged).
      - uses: actions/download-artifact@v4
        with:
          pattern: functor-*
          path: assets
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: assets
      - uses: actions/download-artifact@v4
        with:
          name: vsix-bundles
          path: assets

      # The tag is created + pushed explicitly, then the release attaches to
      # it: `gh release create --target <sha>` is rejected with a 403 for the
      # Actions token even with contents: write (cli/cli#9514), while a plain
      # tag push and a release onto an existing tag are both allowed. The
      # explicit SHA pins the release to the commit the binaries were built
      # from, even if main has moved since the dispatch.
      - name: Create tag + pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ls -l assets
          git tag "v$VERSION" "$GITHUB_SHA"
          git push origin "v$VERSION"
          gh release create "v$VERSION" \
            --verify-tag \
            --title "v$VERSION" \
            --prerelease \
            --notes-file assets/release-notes.md \
            assets/functor-*.tar.gz assets/functor-*.zip assets/*.vsix

  # Marketplace publishes are gated on their PATs. Secrets are not readable in
  # a job-level `if:`, so each job checks the env inside the step and skips
  # with a notice when unconfigured — a missing publisher account must never
  # fail the release (the VSIXes are on the release page regardless).
  publish-marketplace:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix-bundles
          path: vsix
      - name: Publish to the VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [[ -z "$VSCE_PAT" ]]; then
            echo "::notice::VSCE_PAT is not configured — skipping the VS Code Marketplace publish"
            exit 0
          fi
          for f in vsix/*.vsix; do
            npx --yes @vscode/vsce@3.9.2 publish --pre-release --skip-duplicate \
              --packagePath "$f" -p "$VSCE_PAT"
          done

  publish-openvsx:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix-bundles
          path: vsix
      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [[ -z "$OVSX_PAT" ]]; then
            echo "::notice::OVSX_PAT is not configured — skipping the Open VSX publish"
            exit 0
          fi
          for f in vsix/*.vsix; do
            npx --yes ovsx@1.0.2 publish --pre-release --skip-duplicate \
              --packagePath "$f" -p "$OVSX_PAT"
          done

  # A separate job so a failed dispatch can be rerun without tripping over
  # the already-created release in `publish`.
  deploy-site:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write # dispatch Deploy Site
    steps:
      - name: Deploy the site (stamps the new version into the header)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-site.yml --ref main --repo "$GITHUB_REPOSITORY"
