name: Golden (wasm)

# Headless render-regression check. Builds the CLI + embedded web runtime, serves
# the asset-free `primitives` sample as wasm, and compares a screenshot of
# the WebGL2 canvas (software swiftshader) to the committed golden — the
# `primitives-t2` scenario in golden-scenarios.json, driven by
# e2e/golden-wasm.spec.mjs.
#
# The sample is Functor Lang (functor.json `"language": "functor-lang"`): its `.fun` source ships
# as text and is interpreted by the embedded web runtime, so there is no Fable
# transpile and no .NET toolchain — the CLI + web-runtime bundle is all that's
# needed to serve it.
#
# Linux-only: golden images are renderer-specific, and swiftshader is a
# deterministic software rasterizer, so this is the headless path that needs no
# GPU/display (unlike the native golden in golden.rs). The scene uses no external
# assets, so there is nothing to fetch.
#
# Reference images are per-platform (Playwright appends `-chromium-linux`); the
# committed Linux golden is generated from this job. To (re)generate it, run this
# workflow manually with `update_snapshots = true` and commit the
# `golden-wasm` artifact's snapshot.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Regenerate the committed goldens (upload them as an artifact to commit)"
        type: boolean
        default: false

jobs:
  golden-wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js environment
        uses: actions/setup-node@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: npm install -g wasm-pack

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      # Post-E3 the single `functor` binary always includes the native
      # GLFW/OpenGL runtime (in-process `functor run native`), so building the
      # CLI now links X11/GL — install the same system libs as build-native.yml.
      - name: Install GL/X11 system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libglfw3 \
            libglfw3-dev \
            libasound2-dev

      - name: Install npm dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # The wasm golden serves the wasm bundle via the `functor` CLI (which now
      # also embeds the native runtime — see the GL libs installed above).
      - name: Build web runtime bundle
        run: wasm-pack build --target=web
        working-directory: runtime/functor-runtime-web

      - name: Build functor CLI
        run: cargo build --bin functor

      # No per-sample wasm build: the Functor Lang sample ships its `.fun` as text and is
      # interpreted by the embedded web runtime, so `functor run wasm` just
      # serves the project directory (no Fable, no wasm-pack per game).
      - name: Run wasm golden (asset-free primitives scene)
        env:
          FUNCTOR_SAMPLE: primitives
        run: |
          if [ "${{ github.event.inputs.update_snapshots }}" = "true" ]; then
            npm run test:wasm-golden:update
          else
            npm run test:wasm-golden
          fi

      # The snapshot dir carries a freshly written Linux golden when run with
      # update_snapshots; the report/diffs help debug a regression otherwise.
      - name: Upload golden artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: golden-wasm
          path: |
            e2e/golden-wasm.spec.mjs-snapshots
            playwright-report
            test-results
          retention-days: 14
