name: Deploy Site

# Builds the static site (site/dist) and deploys it to the `functor` Worker
# (static assets) at functor.games. Unlike the other CI workflows this never
# builds the GL-linked `functor` binary — it only needs the wasm bundle
# (wasm-pack) and the static site build, so no X11/GL system libs.
#
# Requires two repo secrets: CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:            # one deploy at a time; a newer push supersedes
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: npm install -g wasm-pack

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install npm dependencies
        run: npm ci

      - name: Build web runtime bundle
        run: wasm-pack build --target=web
        working-directory: runtime/functor-runtime-web

      # The editor's language intelligence (diagnostics/hover/completion).
      # site:build treats a missing pkg as optional and skips it, so without
      # this step the deployed editor silently ships with no language services.
      - name: Build language analysis wasm
        run: npm run build:lang-wasm

      - name: Build site
        run: npm run site:build

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          # wrangler-action's default (v3.90.0) predates static-assets-only
          # Workers and demands a `main` entry-point; pin v4, which serves our
          # assets-only wrangler.jsonc (no server script).
          wranglerVersion: "4.110.0"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
