name: Build Native

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-native:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js environment
        uses: actions/setup-node@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: npm install -g wasm-pack

      - name: Install Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libglfw3 \
            libglfw3-dev \
            libasound2-dev \
            libfontconfig-dev

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Build Runtime
        run: cargo build --features=strict
        working-directory: runtime/functor-runtime-desktop

      # Run the unit tests here (rather than a standalone job) to get coverage
      # across the whole OS matrix for free: this job already has the common
      # runtime compiled. The functor-lang suite runs on the default test-thread stack —
      # that is deliberate: it guards the MAX_EVAL_DEPTH-fits-2-MiB budget (#221).
      - name: Run tests
        run: cargo test -p functor_runtime_common -p functor-lang

      - name: Check generated API documentation
        run: npm run check:docs

      # Building the web bundle is necessary for the CLI,
      # since the cli includes the web bundle for dev server
      - name: Build runtime wasm bundle
        run: wasm-pack build --target web
        working-directory: runtime/functor-runtime-web

      - name: Build CLI
        run: cargo build
        working-directory: cli
