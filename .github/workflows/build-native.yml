name: Build Native

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-native:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore tools
        run: dotnet tool restore

      - name: .NET SDK info
        run: |
          dotnet --info
          dotnet --list-sdks

      - name: Setup Node.js environment
        uses: actions/setup-node@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            examples/hello/build-native -> ../target

      - name: Install wasm-pack
        run: npm install -g wasm-pack

      - name: Install Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libglfw3 \
            libglfw3-dev

      - name: Build F#
        run: npm run build:examples:hello:rust -- --verbose

      - name: Build Runtime
        run: cargo build --features=strict
        working-directory: runtime/functor-runtime-desktop

      # Building the web bundle is necessary for the CLI,
      # since the cli includes the web bundle for dev server
      - name: Build runtime wasm bundle
        run: wasm-pack build --target web
        working-directory: runtime/functor-runtime-web

      - name: Build CLI
        run: cargo build
        working-directory: cli

      - name: Build Hello
        run: cargo build
        working-directory: examples/hello/build-native
